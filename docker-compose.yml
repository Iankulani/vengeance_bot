version: '3.8'

services:
  vengeance-bot:
    build: .
    container_name: vengeance-bot
    restart: unless-stopped
    ports:
      - "5000:5000"   # Web Dashboard
      - "8080:8080"   # Phishing Server
      - "9090:9090"   # Metrics
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./.vengeance:/app/.vengeance
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      - WEB_PORT=5000
      - PHISHING_PORT=8080
      - METRICS_PORT=9090
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://vengeance:vengeance123@postgres:5432/vengeance
    networks:
      - vengeance-network
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "python3", "healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: vengeance-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vengeance-network
    command: redis-server --appendonly yes

  postgres:
    image: postgres:15-alpine
    container_name: vengeance-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vengeance
      - POSTGRES_USER=vengeance
      - POSTGRES_PASSWORD=vengeance123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vengeance-network

  prometheus:
    image: prom/prometheus:latest
    container_name: vengeance-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - vengeance-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: vengeance-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=vengeance123
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - vengeance-network
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    container_name: vengeance-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    networks:
      - vengeance-network
    depends_on:
      - vengeance-bot

networks:
  vengeance-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data: